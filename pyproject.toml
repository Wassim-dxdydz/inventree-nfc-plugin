#This file is used to package the NFC plugin.
#
#- It was generated by the InvenTree Plugin Creator tool - version 1.16.0
#- Ref: https://github.com/inventree/plugin_creator

[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-nfc"
description = "NFC-based stock management plugin"
dynamic = ["version"]
authors = [
    { name = "ABAHRI Wassim",email = "abahriwassim44@gmail.com" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    # Enter your plugin library dependencies here
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://my-project-url.com"

[project.entry-points."inventree_plugins"]
NFC = "nfc.core:NFC"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "nfc.PLUGIN_VERSION"}

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["nfc"]
